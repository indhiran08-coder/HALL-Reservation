# Application Properties — Smart Conference Hall Reservation System
# Velalar College of Engineering and Technology (VCET)

spring.application.name=hall-reservation

# ─── Supabase Session Pooler ─── (region: ap-northeast-2 / Seoul)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.jwsngfryxtrlkhcxbjhy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Erlinghaaland}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) — smaller pool for Railway free tier
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================
# JWT CONFIGURATION
# =============================================
app.jwt.secret=dkNFVEhhbGxSZXNlcnZhdGlvblN5c3RlbVNlY3JldEtleVZDRVQyMDI1U2VjdXJlSldU
app.jwt.expiration=86400000

# =============================================
# EMAIL — Gmail SMTP
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:hallreservation.vcet@gmail.com}
spring.mail.password=${MAIL_PASSWORD:rxtkyciucaovowlr}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# APPLICATION SETTINGS
# =============================================
app.college.name=Velalar College of Engineering and Technology
app.college.email-domain=velalarengg.ac.in
app.otp.expiry-minutes=10
# Supports both local dev and Vercel-deployed frontend
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

